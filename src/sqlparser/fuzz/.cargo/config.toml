# Override parent config to avoid linker conflicts with honggfuzz
# honggfuzz forces -fuse-ld=gold, so we must not use lld-specific flags
[target.x86_64-unknown-linux-gnu]
rustflags = ["-Ctarget-feature=+avx2"]

# Don't inherit the parent's Linux-specific lld flags
[target.'cfg(target_os = "linux")']
rustflags = []

[target.'cfg(all())']
rustflags = [
    "--cfg",
    "tokio_unstable",
]
